name: Update Skylife EPG Daily

on:
  schedule:
    # 매일 한국 시간 오전 5시(UTC 20:00)에 자동 실행
    - cron: '0 20 * * *'
  workflow_dispatch: # 언제든 수동으로 실행할 수 있는 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Clone iptv-org/epg tool
      run: |
        git clone --depth 1 https://github.com/iptv-org/epg.git epg-tool
        cd epg-tool
        npm install

    - name: Grab Skylife EPG Data
      run: |
        cd epg-tool
        npm run grab -- --sites=skylife.co.kr,tv.cctv.com --output=../korea_guide.xml

    # ✨ [추가된 단계] 연합뉴스 채널명 호환성 태그 삽입
    - name: Inject Custom Channel Names
      run: |
        # 원래 있던 연합뉴스TV 줄 바로 밑에 '연합뉴스' 디스플레이 네임을 가진 줄을 강제로 추가합니다.
        sed -i '/<channel id="4004#566"><display-name>연합뉴스TV<\/display-name><\/channel>/a \<channel id="4004#566"><display-name>연합뉴스<\/display-name><\/channel>' korea_guide.xml

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add korea_guide.xml
        git commit -m "Update Skylife EPG (with patches): $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
