name: Update Skylife EPG Daily

on:
  schedule:
    # 매일 한국 시간 오전 5시(UTC 20:00)에 자동 실행
    - cron: '0 20 * * *'
  workflow_dispatch: # 언제든 수동으로 실행할 수 있는 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Clone iptv-org/epg tool
      run: |
        git clone --depth 1 https://github.com/iptv-org/epg.git epg-tool
        cd epg-tool
        npm install

    - name: Grab Skylife EPG Data
      run: |
        cd epg-tool
        npm run grab -- --sites=skylife.co.kr,tv.cctv.com --output=../korea_guide.xml

    # ✨ [수정 완료] 구분자를 | 기호로 변경하여 이스케이프 에러 방지
    - name: Inject Custom Channel Names
      run: |
        sed -i '\|<channel id="4004#566"><display-name>연합뉴스TV</display-name></channel>|a <channel id="4004#566"><display-name>연합뉴스</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#555"><display-name>tvN DRAMA</display-name></channel>|a <channel id="4009#555"><display-name>tvN드라마</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#282"><display-name>tvN SHOW</display-name></channel>|a <channel id="4009#282"><display-name>tvN쇼</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#272"><display-name>tvN STORY</display-name></channel>|a <channel id="4009#272"><display-name>tvN스토리</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4006#509"><display-name>KBS Story</display-name></channel>|a <channel id="4006#509"><display-name>KBSStory</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4011#291"><display-name>KBS LIFE</display-name></channel>|a <channel id="4011#291"><display-name>KBSLIFE</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4006#910"><display-name>KBS Drama</display-name></channel>|a <channel id="4006#910"><display-name>KBSDrama</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4012#596"><display-name>KBS Kids</display-name></channel>|a <channel id="4012#596"><display-name>KBSKids</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#968"><display-name>KBS Joy</display-name></channel>|a <channel id="4009#968"><display-name>KBSJoy</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#627"><display-name>채널A플러스</display-name></channel>|a <channel id="4009#627"><display-name>채널A Plus</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4012#84"><display-name>애니박스</display-name></channel>|a <channel id="4012#84"><display-name>ANIBOX</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4006#857"><display-name>MBC드라마</display-name></channel>|a <channel id="4006#857"><display-name>MBCDrama</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#58"><display-name>MBC Every1</display-name></channel>|a <channel id="4009#58"><display-name>MBCEvery1</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#126"><display-name>MBC M</display-name></channel>|a <channel id="4009#126"><display-name>MBCM</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4006#96"><display-name>MBC ON</display-name></channel>|a <channel id="4006#96"><display-name>MBCON</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4009#85"><display-name>K STAR</display-name></channel>|a <channel id="4009#85"><display-name>K-STAR</display-name></channel>' korea_guide.xml
        sed -i '\|<channel id="4012#56"><display-name>애니원</display-name></channel>|a <channel id="4012#56"><display-name>ANIONE</display-name></channel>' korea_guide.xml

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add korea_guide.xml
        git commit -m "Update Skylife EPG (with patches): $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
